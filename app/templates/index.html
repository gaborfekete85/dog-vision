<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dog Vision — Breed Classifier</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <h1>Dog Vision</h1>
    <p class="tagline">Upload a photo of a dog — the model will tell you the breed (120 breeds, MobileNetV2).</p>
  </header>

  <main>
    <section class="upload-card">
      <label for="file-input" class="browse-btn">
        <span class="icon">&#128194;</span>
        <span>Browse image…</span>
      </label>
      <input id="file-input" type="file" accept="image/*" hidden />

      <div id="preview-wrap" class="preview-wrap hidden">
        <img id="preview" alt="preview" />
        <div class="preview-actions">
          <span id="file-name" class="file-name"></span>
          <button id="predict-btn" class="primary-btn" disabled>Identify breed</button>
          <button id="clear-btn" class="ghost-btn">Clear</button>
        </div>
      </div>

      <div id="status" class="status hidden"></div>
    </section>

    <section id="results" class="results hidden">
      <div class="top-card">
        <div class="top-label">Predicted breed</div>
        <div id="top-breed" class="top-breed">—</div>
        <div id="top-confidence" class="top-confidence">—</div>
      </div>

      <h2>All breed probabilities</h2>
      <div class="chart-controls">
        <label>
          <input type="checkbox" id="show-all" />
          Show all 120 breeds (default: top 15)
        </label>
      </div>
      <div id="chart" class="chart"></div>
    </section>
  </main>

  <footer>
    <span id="health">connecting…</span>
  </footer>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
